{% extends "base.html" %}
{% block title %}Courses{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">Courses</h1>
  <a class="btn btn-primary" href="{{ url_for('admin.course_add') }}">Add course</a>
</div>
<div class="card">
  <div class="table-responsive">
    <table class="table table-hover mb-0">
      <thead><tr><th>Code</th><th>Name</th><th>Duration (years)</th><th></th></tr></thead>
      <tbody>
        {% for c in courses %}
        <tr>
          <td class="fw-medium">{{ c.code }}</td>
          <td>{{ c.name }}</td>
          <td>{{ c.duration_years }}</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-secondary" href="{{ url_for('admin.course_edit', cid=c.id) }}">Edit</a>
            <form class="d-inline" method="post" action="{{ url_for('admin.course_delete', cid=c.id) }}" onsubmit="return confirm('Delete this course?');">
              <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="4" class="text-muted py-4 text-center">No courses yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
