{% extends "base.html" %}
{% block title %}{% if subject %}Edit{% else %}Add{% endif %} subject{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{% if subject %}Edit{% else %}Add{% endif %} subject</h1>
<div class="card p-4" style="max-width: 32rem;">
  <form method="post">
    <div class="mb-3">
      <label class="form-label" for="course_id">Course</label>
      <select class="form-select" id="course_id" name="course_id" required>
        <option value="">— Select —</option>
        {% for c in courses %}
        <option value="{{ c.id }}" {% if subject and subject.course_id == c.id %}selected{% endif %}>{{ c.code }} — {{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label" for="code">Subject code</label>
      <input class="form-control" id="code" name="code" required value="{{ subject.code if subject else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label" for="name">Subject name</label>
      <input class="form-control" id="name" name="name" required value="{{ subject.name if subject else '' }}">
    </div>
    <div class="row">
      <div class="col mb-3">
        <label class="form-label" for="max_internal">Max internal</label>
        <input class="form-control" type="number" min="0" id="max_internal" name="max_internal" value="{{ subject.max_internal if subject else 40 }}">
      </div>
      <div class="col mb-3">
        <label class="form-label" for="max_external">Max external</label>
        <input class="form-control" type="number" min="0" id="max_external" name="max_external" value="{{ subject.max_external if subject else 60 }}">
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('admin.subjects_list') }}">Cancel</a>
  </form>
</div>
{% endblock %}
